<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management System - Login</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="img/attendease-logo-icon.png">
<meta name="theme-color" content="#05110a">
</head>
<body class="login-page">
<div class="login-container login-shell">
  <div class="login-card login-stage-card">
    <section class="login-stage login-stage-minimal">
      <div class="login-stage-bg" aria-hidden="true">
        <span class="login-stage-shape login-stage-shape-a"></span>
        <span class="login-stage-shape login-stage-shape-b"></span>
        <span class="login-stage-shape login-stage-shape-c"></span>
        <span class="login-stage-glow"></span>
      </div>
      <div class="auth-stage-brand">
        <div class="logo-icon" data-brand-variant="full"></div>
      </div>
    </section>

    <section class="login-form-panel">
      <div class="login-logo">
        <div class="logo-icon">🎓</div>
        <h1>AttendEase</h1>
        <p>Attendance Management System</p>
      </div>
      <h2 class="auth-form-heading">Login</h2>
      <form id="loginForm">
        <div class="auth-line-group">
          <label for="username">Username</label>
          <div class="auth-line-field">
            <span class="auth-line-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="auth-line-icon-svg">
                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.87 0-7 1.79-7 4v1h14v-1c0-2.21-3.13-4-7-4Z"/>
              </svg>
            </span>
            <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>
        <div class="auth-line-group">
          <label for="password">Password</label>
          <div class="auth-line-field">
            <span class="auth-line-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="auth-line-icon-svg">
                <path d="M17 9h-1V7a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 0V7a2 2 0 1 1 4 0v2Z"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            <button
              type="button"
              class="auth-line-toggle"
              id="passwordToggle"
              aria-label="Show password"
              aria-pressed="false"
              onclick="toggleLoginPassword()">
              <svg viewBox="0 0 24 24" class="auth-line-toggle-svg auth-line-toggle-eye" aria-hidden="true">
                <path d="M2.2 12s3.5-6 9.8-6 9.8 6 9.8 6-3.5 6-9.8 6-9.8-6-9.8-6Z"></path>
                <circle cx="12" cy="12" r="3.2"></circle>
              </svg>
              <svg viewBox="0 0 24 24" class="auth-line-toggle-svg auth-line-toggle-eye-off hidden" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.7 6.2A10.9 10.9 0 0 1 12 6c6.3 0 9.8 6 9.8 6a17.6 17.6 0 0 1-3.2 3.9"></path>
                <path d="M6.6 6.7C4.2 8.3 2.2 12 2.2 12s3.5 6 9.8 6c1.9 0 3.5-.5 4.9-1.2"></path>
                <path d="M9.9 9.9A3.2 3.2 0 0 0 12 15.2c.8 0 1.6-.3 2.1-.9"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <div class="login-actions-row">
          <a href="forgot-password.html" class="login-link">Forgot password?</a>
          <button type="submit" class="btn btn-primary login-submit-btn" id="loginBtn">
            <span>Login</span>
          </button>
        </div>
      </form>
      <div class="login-divider"><span>or</span></div>
      <a href="register.html" class="btn btn-secondary btn-full login-register-btn" style="text-align:center;">Create an Account</a>
    </section>
  </div>
</div>
  <script src="js/app.js"></script>
  <script>
    const loginPageParams = new URLSearchParams(window.location.search);
    if (loginPageParams.get('session') === 'expired') {
      const err = document.getElementById('loginError');
      err.textContent = 'Your session expired. Please log in again.';
      err.classList.remove('hidden');
      window.history.replaceState({}, document.title, 'index.html');
    }

    function toggleLoginPassword() {
      const input = document.getElementById('password');
      const button = document.getElementById('passwordToggle');
      const showIcon = button.querySelector('.auth-line-toggle-eye');
      const hideIcon = button.querySelector('.auth-line-toggle-eye-off');
      const showPassword = input.type === 'password';

      input.type = showPassword ? 'text' : 'password';
      button.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
      button.setAttribute('aria-pressed', showPassword ? 'true' : 'false');
      showIcon.classList.toggle('hidden', showPassword);
      hideIcon.classList.toggle('hidden', !showPassword);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';
    err.classList.add('hidden');

    const res = await API.post('/api/login', {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    });

    if (res.token) {
      localStorage.setItem('token', res.token);
      localStorage.setItem('role', res.role);
      localStorage.setItem('name', res.name);
      localStorage.setItem('uid', res.id);
      localStorage.setItem('profile_id', res.profile_id || '');
      localStorage.setItem('student_number', res.student_number || '');
      window.location.href = 'dashboard.html';
    } else {
      err.textContent = res.error || 'Login failed';
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.innerHTML = '<span>Login</span>';
    }
  });
</script>
</body>
</html>
