<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marks - AttendEase</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="img/attendease-logo-icon.png">
<meta name="theme-color" content="#05110a">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-icon">🎓</div><span class="logo-text">AttendEase</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">-</div></div>
      </div>
      
    </div>
  </aside>
  <main class="main-content">
    <header class="top-bar">
      <button type="button" class="btn-icon" onclick="toggleSidebar()">☰</button>
      <h2 class="page-title" id="marksPageTitle">Manage Marks</h2>
      <div class="top-bar-right" id="marksAddBtn">
        <button type="button" class="btn btn-primary" onclick="openModal()">+ Add Mark</button>
      </div>
    </header>
    <div class="content-area">
      <div class="filter-bar" id="marksFilterBar">
        <div class="form-group inline">
          <label>Filter by Student</label>
          <select id="filterStudent" onchange="loadMarks()">
            <option value="">All Students</option>
          </select>
        </div>
      </div>
      <div class="table-card">
        <table class="data-table">
          <thead><tr><th>Student</th><th>Subject</th><th>Type</th><th>Score</th><th>Max</th><th>%</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="marksBody"><tr><td colspan="8" class="loading-row">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Mark</h3>
      <button type="button" class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <form id="markForm">
      <input type="hidden" id="markId">
      <div class="form-row">
        <div class="form-group">
          <label>Student *</label>
          <select id="fStudent" required><option value="">Select student</option></select>
        </div>
        <div class="form-group">
          <label>Subject *</label>
          <select id="fSubject" required><option value="">Select subject</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Exam Type *</label>
          <select id="fType" required>
            <option value="quiz">Quiz</option>
            <option value="midterm">Midterm</option>
            <option value="finals">Finals</option>
            <option value="activity">Activity</option>
            <option value="project">Project</option>
          </select>
        </div>
        <div class="form-group"><label>Score *</label><input type="number" id="fScore" step="0.01" required></div>
        <div class="form-group"><label>Max Score *</label><input type="number" id="fMax" step="0.01" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date *</label><input type="date" id="fDate" required></div>
        <div class="form-group"><label>Remarks</label><input type="text" id="fRemarks"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  requireAuth();
  renderNav();

  const ROLE = localStorage.getItem('role');
  const PROFILE_ID = currentProfileId();

  if (ROLE === 'student') {
    document.getElementById('marksPageTitle').textContent = 'My Marks';
    document.getElementById('marksAddBtn').classList.add('hidden');
    document.getElementById('marksFilterBar').classList.add('hidden');
  }

  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  loadDropdowns();
  loadMarks();

  async function loadDropdowns() {
    const subjects = await API.get('/api/subjects');
    if (ROLE !== 'student') {
      const students = await API.get('/api/students');
      if (students) {
        const sel = document.getElementById('filterStudent');
        sel.innerHTML = '<option value=\"\">All Students</option>' + students.map(s =>
          `<option value="${s.id}">${s.full_name}</option>`
        ).join('');
      }
    }
    if (subjects) {
      const fSub = document.getElementById('fSubject');
      fSub.innerHTML = '<option value="">Select subject</option>';
      subjects.forEach(subject => {
        fSub.innerHTML += `<option value="${subject.id}">${subject.name} (${subject.code})</option>`;
      });
    }
    await loadStudentOptionsForSubject();
  }

  async function loadStudentOptionsForSubject(selectedStudentId = '') {
    if (ROLE === 'student') return;
    const subjectId = document.getElementById('fSubject').value;
    const students = await API.get('/api/students' + (subjectId ? ('?subject_id=' + encodeURIComponent(subjectId)) : ''));
    const fSel = document.getElementById('fStudent');
    fSel.innerHTML = '<option value="">Select student</option>';
    if (students) {
      students.forEach(s => {
        fSel.innerHTML += `<option value="${s.id}">${s.full_name}</option>`;
      });
    }
    if (selectedStudentId) fSel.value = selectedStudentId;
  }

  async function loadMarks() {
    const sid = ROLE === 'student' ? PROFILE_ID : document.getElementById('filterStudent').value;
    const data = await API.get('/api/marks' + (sid ? '?student_id=' + sid : ''));
    const tbody = document.getElementById('marksBody');
    if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="empty-row">No marks found</td></tr>'; return; }
    tbody.innerHTML = data.map(m => {
      const pct = ((m.score / m.max_score) * 100).toFixed(1);
      const cls = pct >= 75 ? 'success' : pct >= 50 ? 'warning' : 'danger';
      const actions = ROLE === 'student' ? '' : `
        <button type="button" class="btn btn-sm btn-secondary" onclick="editMark('${encodeURIComponent(JSON.stringify(m))}')">Edit</button>
        <button type="button" class="btn btn-sm btn-danger" onclick="deleteMark(${m.id})">Delete</button>`;
      return `<tr>
        <td>${m.full_name}</td><td>${m.subject_name}</td>
        <td><span class="badge ${m.exam_type}">${m.exam_type}</span></td>
        <td>${m.score}</td><td>${m.max_score}</td>
        <td><span class="grade-badge ${cls}">${pct}%</span></td>
        <td>${m.date}</td>
        <td class="actions">${actions}</td>
      </tr>`;
    }).join('');
  }

  function openModal(data=null) {
    document.getElementById('markForm').reset();
    document.getElementById('modalTitle').textContent = data ? 'Edit Mark' : 'Add Mark';
    document.getElementById('markId').value   = data ? data.id : '';
    document.getElementById('fSubject').value = data ? data.subject_id : '';
    document.getElementById('fType').value    = data ? data.exam_type : 'quiz';
    document.getElementById('fScore').value   = data ? data.score : '';
    document.getElementById('fMax').value     = data ? data.max_score : '';
    document.getElementById('fDate').value    = data ? data.date : new Date().toISOString().split('T')[0];
    document.getElementById('fRemarks').value = data ? data.remarks||'' : '';
    loadStudentOptionsForSubject(data ? data.student_profile_id : '');
    document.getElementById('modalOverlay').classList.remove('hidden');
  }
  function editMark(encoded) { openModal(JSON.parse(decodeURIComponent(encoded))); }
  function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

  document.getElementById('markForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('markId').value;
    const confirmed = await requestSaveConfirmation({
      title: id ? 'Update Mark' : 'Save Mark',
      message: id ? 'Do you want to update this mark?' : 'Do you want to save this mark?'
    });
    if (!confirmed) return;
    const payload = { id,
      student_id: document.getElementById('fStudent').value,
      subject_id: document.getElementById('fSubject').value,
      exam_type:  document.getElementById('fType').value,
      score:      document.getElementById('fScore').value,
      max_score:  document.getElementById('fMax').value,
      date:       document.getElementById('fDate').value,
      remarks:    document.getElementById('fRemarks').value
    };
    const res = id ? await API.put('/api/marks', payload) : await API.post('/api/marks', payload);
    if (res.message) { closeModal(); loadMarks(); showToast(res.message, 'success'); }
    else showToast(res.error || 'Error', 'error');
  });

  async function deleteMark(id) {
    const confirmed = await showConfirmModal({
      title: 'Delete Mark',
      message: 'Do you want to delete this mark?',
      confirmText: 'Yes',
      cancelText: 'No'
    });
    if (!confirmed) return;
    const res = await API.delete('/api/marks?id=' + id);
    if (res.message) { loadMarks(); showToast(res.message, 'success'); }
  }

  document.getElementById('fSubject').addEventListener('change', () => loadStudentOptionsForSubject());
</script>
</body>
</html>
